</head>

        let curiosidadesFiltradas = [...curiosidades];
        const container = document.getElementById("curiosidades");
        const contadorCards = document.getElementById("contadorCards");

        // ===== SALVAR ESTADO =====
        function salvarEstado() {
            const curtidas = JSON.parse(localStorage.getItem("curtidas") || "[]");
            const salvos = JSON.parse(localStorage.getItem("salvos") || "[]");
            return { curtidas, salvos };
        }

        function toggleCurtida(index) {
            let { curtidas } = salvarEstado();
            const idGlobal = curiosidadesFiltradas[index].titulo;
            if (curtidas.includes(idGlobal)) {
                curtidas = curtidas.filter(c => c !== idGlobal);
            } else {
                curtidas.push(idGlobal);
            }
            localStorage.setItem("curtidas", JSON.stringify(curtidas));
            renderizarCuriosidades();
        }

        function toggleSalvo(index) {
            let { salvos } = salvarEstado();
            const idGlobal = curiosidadesFiltradas[index].titulo;
            if (salvos.includes(idGlobal)) {
                salvos = salvos.filter(s => s !== idGlobal);
            } else {
                salvos.push(idGlobal);
            }
            localStorage.setItem("salvos", JSON.stringify(salvos));
            renderizarCuriosidades();
        }

        // ===== RENDERIZAR CARDS =====
        function renderizarCuriosidades() {
            const { curtidas, salvos } = salvarEstado();
            container.innerHTML = "";
            contadorCards.textContent = curiosidadesFiltradas.length;

            if (curiosidadesFiltradas.length === 0) {
                container.innerHTML = `<p style="grid-column:1/-1;text-align:center;font-size:1.3rem;color:#999;padding:40px;">Nenhuma curiosidade encontrada nesta categoria. 😢</p>`;
                return;
            }

            curiosidadesFiltradas.forEach((item, index) => {
                const idGlobal = item.titulo;
                const curtido = curtidas.includes(idGlobal);
                const salvo = salvos.includes(idGlobal);

                const card = document.createElement("section");
                card.className = "curiosidade";
                card.onclick = function(e) {
                    if (!e.target.closest("button")) {
                        abrirModal(item);
                    }
                };

                card.innerHTML = `
                    <span class="emoji-titulo">${item.emoji || "❓"}</span>
                    <span class="categoria-badge">${item.categoria.replace("-", " ")}</span>
                    <h2>${item.titulo}</h2>
                    <p>${item.texto}</p>
                    <div class="acoes">
                        <button class="btn-like ${curtido ? "curtido" : ""}" onclick="event.stopPropagation();toggleCurtida(${index})">
                            ${curtido ? "❤️ Curtido" : "🤍 Curtir"}
                        </button>
                        <button class="btn-salvar ${salvo ? "salvo" : ""}" onclick="event.stopPropagation();toggleSalvo(${index})">
                            ${salvo ? "📌 Salvo" : "📌 Salvar"}
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ===== MODAL =====
        function abrirModal(item) {
            const modal = document.getElementById("modalAleatoria");
            const conteudo = document.getElementById("modalConteudo");
            conteudo.innerHTML = `
                <button class="fechar" onclick="fecharModal()">✕</button>
                <div class="emoji">${item.emoji || "❓"}</div>
                <h2>${item.titulo}</h2>
                <p>${item.texto}</p>
                <button class="compartilhar" onclick="compartilharCuriosidade('${item.titulo}', '${item.texto}')">
                    📤 Compartilhar no WhatsApp
                </button>
            `;
            modal.classList.add("ativo");
        }

        function fecharModal() {
            document.getElementById("modalAleatoria").classList.remove("ativo");
        }

        function abrirAleatoria() {
            const item = curiosidades[Math.floor(Math.random() * curiosidades.length)];
            abrirModal(item);
        }

        function abrirCuriosidadeDoDia() {
            const hoje = new Date().toDateString();
            let indice = 0;
            for (let i = 0; i < hoje.length; i++) {
                indice += hoje.charCodeAt(i);
            }
            indice = indice % curiosidades.length;
            abrirModal(curiosidades[indice]);
        }

        function compartilharCuriosidade(titulo, texto) {
            const mensagem = encodeURIComponent(`🤔 *Que Tal Essa?*\n\n${titulo}\n${texto}\n\nVeja mais: https://youtube.com/@quetalessa58 🔥`);
            window.open(`https://wa.me/?text=${mensagem}`, "_blank");
        }

        // ===== FILTROS =====
        function filtrarPorCategoria(categoria) {
            curiosidadesFiltradas = curiosidades.filter(c => c.categoria === categoria);
            renderizarCuriosidades();
            document.querySelectorAll(".btn-categoria").forEach(b => b.classList.remove("ativo"));
            event.target.classList.add("ativo");
            container.scrollIntoView({ behavior: "smooth" });
        }

        function mostrarTodas() {
            curiosidadesFiltradas = [...curiosidades];
            renderizarCuriosidades();
            document.querySelectorAll(".btn-categoria").forEach(b => b.classList.remove("ativo"));
        }

        // ===== BOTÃO VOLTAR AO TOPO =====
        window.addEventListener("scroll", () => {
            const btn = document.getElementById("btnTopo");
            if (window.scrollY > 600) {
                btn.classList.add("visivel");
            } else {
                btn.classList.remove("visivel");
            }
        });

        // ===== FECHAR MODAL COM ESC OU CLIQUE FORA =====
        document.getElementById("modalAleatoria").addEventListener("click", function(e) {
            if (e.target === this) fecharModal();
        });

        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape") fecharModal();
        });

        // ===== INICIAR =====
        renderizarCuriosidades();
    </script>
